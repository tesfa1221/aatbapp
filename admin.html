<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AATB Admin</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}nav{background:#1e293b;border-bottom:1px solid #334155;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}.nav-brand{font-size:1.1rem;font-weight:700;color:#fff}.nav-tabs{display:flex;gap:4px}.tab-btn{background:none;border:none;color:#94a3b8;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.875rem}.tab-btn.active,.tab-btn:hover{background:#334155;color:#fff}main{max-width:1200px;margin:0 auto;padding:24px}.page{display:none}.page.active{display:block}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}.stat-label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;margin-bottom:6px}.stat-value{font-size:2rem;font-weight:700}.blue{color:#3b82f6}.green{color:#22c55e}.red{color:#ef4444}.yellow{color:#f59e0b}.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:20px}.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.card-title{font-size:.95rem;font-weight:600;color:#fff}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px 14px;text-align:left;border-bottom:1px solid #334155;font-size:.85rem}th{color:#94a3b8;background:#0f172a}tr:hover td{background:#1a2744}.plate-num{font-family:monospace;font-weight:700;letter-spacing:2px;background:#0f172a;padding:3px 10px;border-radius:6px;border:1px solid #334155}.badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}.b-valid{background:#14532d;color:#86efac}.b-rejected{background:#450a0a;color:#fca5a5}.b-active{background:#1e3a5f;color:#93c5fd}.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:500}.btn-success{background:#22c55e;color:#fff}.btn-danger{background:#ef4444;color:#fff;padding:4px 10px;font-size:.75rem}.btn-ghost{background:#334155;color:#e2e8f0}.form-row{display:flex;gap:10px;margin-bottom:4px}.form-input{flex:1;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:10px 14px;border-radius:8px;font-size:.9rem;outline:none}.empty{text-align:center;padding:32px;color:#475569}#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:12px 20px;border-radius:10px;font-size:.85rem;opacity:0;transition:.3s;z-index:999;pointer-events:none}#toast.show{opacity:1}#toast.success{border-color:#22c55e;color:#22c55e}#toast.error{border-color:#ef4444;color:#ef4444}</style></head><body><nav><div class="nav-brand">AATB Admin Panel</div><div class="nav-tabs"><button class="tab-btn active" onclick="showPage('dashboard',this)">Dashboard</button><button class="tab-btn" onclick="showPage('plates',this)">Plates</button><button class="tab-btn" onclick="showPage('attendance',this)">Attendance</button></div></nav><main><div id="page-dashboard" class="page active"><div class="stats-grid"><div class="stat-card"><div class="stat-label">Total Registered</div><div class="stat-value blue" id="s-total">-</div></div><div class="stat-card"><div class="stat-label">Present Today</div><div class="stat-value green" id="s-present">-</div></div><div class="stat-card"><div class="stat-label">Absent Today</div><div class="stat-value red" id="s-absent">-</div></div><div class="stat-card"><div class="stat-label">Scans Today</div><div class="stat-value yellow" id="s-scans">-</div></div></div><div class="card"><div class="card-header"><span class="card-title">Recent Scans</span><button class="btn btn-ghost" onclick="loadStats();loadRecent()">Refresh</button></div><div class="table-wrap"><table><thead><tr><th>Plate</th><th>Status</th><th>Reason</th><th>Time</th></tr></thead><tbody id="recent-body"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody></table></div></div></div><div id="page-plates" class="page"><div class="card"><div class="card-header"><span class="card-title">Register New Plate</span></div><div class="form-row"><input id="new-plate" class="form-input" placeholder="Plate number e.g. ABC 1234"><button class="btn btn-success" onclick="addPlate()">+ Register</button></div></div><div class="card"><div class="card-header"><span class="card-title">Registered Plates</span><button class="btn btn-ghost" onclick="loadPlates()">Refresh</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Plate</th><th>Registered At</th><th>Status</th><th>Action</th></tr></thead><tbody id="plates-body"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody></table></div></div></div><div id="page-attendance" class="page"><div class="card"><div class="card-header"><span class="card-title">Attendance Log</span><button class="btn btn-ghost" onclick="loadAttendance()">Refresh</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Plate</th><th>Status</th><th>Reason</th><th>Scanned At</th></tr></thead><tbody id="attendance-body"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody></table></div></div></div></main><div id="toast"></div><script>const BASE="api/";function showPage(n,b){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));document.getElementById("page-"+n).classList.add("active");b.classList.add("active");if(n==="dashboard"){loadStats();loadRecent();}if(n==="plates")loadPlates();if(n==="attendance")loadAttendance();}function toast(msg,type="success"){const t=document.getElementById("toast");t.textContent=msg;t.className="show "+type;setTimeout(()=>t.className="",3000);}async function loadStats(){try{const d=await(await fetch(BASE+"dashboard_stats.php")).json();document.getElementById("s-total").textContent=d.total_plates??"";document.getElementById("s-present").textContent=d.today_present??"";document.getElementById("s-absent").textContent=d.today_absent??"";document.getElementById("s-scans").textContent=d.today_scans??"";}catch(e){}}async function loadRecent(){const tb=document.getElementById("recent-body");try{const data=await(await fetch(BASE+"attendance_log.php")).json();if(!data.length){tb.innerHTML="<tr><td colspan=4 class=empty>No records yet.</td></tr>";return;}tb.innerHTML=data.slice(0,8).map(a=>"<tr><td><span class=plate-num>"+a.plate_number+"</span></td><td><span class=badge "+( a.status==="valid"?"b-valid":"b-rejected")+">"+a.status.toUpperCase()+"</span></td><td>"+(a.reason||"")+"</td><td>"+(a.scanned_at||"")+"</td></tr>").join("");}catch(e){tb.innerHTML="<tr><td colspan=4 class=empty>Failed to load.</td></tr>";}}async function loadAttendance(){const tb=document.getElementById("attendance-body");try{const data=await(await fetch(BASE+"attendance_log.php")).json();if(!data.length){tb.innerHTML="<tr><td colspan=5 class=empty>No records yet.</td></tr>";return;}tb.innerHTML=data.map((a,i)=>"<tr><td>"+a.id+"</td><td><span class=plate-num>"+a.plate_number+"</span></td><td><span class=badge "+(a.status==="valid"?"b-valid":"b-rejected")+">"+a.status.toUpperCase()+"</span></td><td>"+(a.reason||"")+"</td><td>"+(a.scanned_at||"")+"</td></tr>").join("");}catch(e){tb.innerHTML="<tr><td colspan=5 class=empty>Failed to load.</td></tr>";}}async function loadPlates(){const tb=document.getElementById("plates-body");try{const data=await(await fetch(BASE+"get_plates.php")).json();if(!data.length){tb.innerHTML="<tr><td colspan=5 class=empty>No plates registered.</td></tr>";return;}tb.innerHTML=data.map((p,i)=>"<tr><td>"+(i+1)+"</td><td><span class=plate-num>"+p.plate_number+"</span></td><td>"+(p.created_at||"")+"</td><td><span class=badge b-active>ACTIVE</span></td><td><button class=btn onclick=deletePlate('"+p.plate_number+"') style=background:#ef4444;color:#fff;padding:4px 10px;border:none;border-radius:6px;cursor:pointer>Delete</button></td></tr>").join("");}catch(e){tb.innerHTML="<tr><td colspan=5 class=empty>Failed to load.</td></tr>";}}async function addPlate(){const inp=document.getElementById("new-plate");const plate=inp.value.trim().toUpperCase();if(!plate){toast("Enter a plate number","error");return;}try{const d=await(await fetch(BASE+"register.php",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({plate_number:plate})})).json();if(d.status==="success"){toast("Plate "+plate+" registered");inp.value="";loadPlates();loadStats();}else toast(d.message||"Error","error");}catch(e){toast("Network error","error");}}async function deletePlate(plate){if(!confirm("Delete plate "+plate+"?"))return;try{const d=await(await fetch(BASE+"delete_plate.php",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({plate_number:plate})})).json();if(d.status==="success"){toast("Plate deleted");loadPlates();loadStats();}else toast(d.message||"Error","error");}catch(e){toast("Network error","error");}}loadStats();loadRecent();</script></body></html>
